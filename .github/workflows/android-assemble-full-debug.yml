name: Android Assemble Full Debug

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  assemble-full-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties from repository secrets
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets['SUPABASE_URL'] }}
          SUPABASE_ANON_KEY: ${{ secrets['SUPABASE_ANON_KEY'] }}
          NUVIO_RELEASE_KEY_ALIAS: ${{ secrets['NUVIO_RELEASE_KEY_ALIAS'] }}
          NUVIO_RELEASE_KEY_PASSWORD: ${{ secrets['NUVIO_RELEASE_KEY_PASSWORD'] }}
          NUVIO_RELEASE_STORE_PASSWORD: ${{ secrets['NUVIO_RELEASE_STORE_PASSWORD'] }}
          TRAKT_CLIENT_ID: ${{ secrets['TRAKT_CLIENT_ID'] }}
          TRAKT_CLIENT_SECRET: ${{ secrets['TRAKT_CLIENT_SECRET'] }}
        run: |
          if [[ -z "$SUPABASE_URL" || -z "$SUPABASE_ANON_KEY" ]]; then
            echo "Missing required repository secrets SUPABASE_URL or SUPABASE_ANON_KEY" >&2
            exit 1
          fi

          {
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"

            if [[ -n "$NUVIO_RELEASE_KEY_ALIAS" ]]; then
              echo "NUVIO_RELEASE_KEY_ALIAS=$NUVIO_RELEASE_KEY_ALIAS"
            fi

            if [[ -n "$NUVIO_RELEASE_KEY_PASSWORD" ]]; then
              echo "NUVIO_RELEASE_KEY_PASSWORD=$NUVIO_RELEASE_KEY_PASSWORD"
            fi

            if [[ -n "$NUVIO_RELEASE_STORE_PASSWORD" ]]; then
              echo "NUVIO_RELEASE_STORE_PASSWORD=$NUVIO_RELEASE_STORE_PASSWORD"
            fi

            if [[ -n "$TRAKT_CLIENT_ID" ]]; then
              echo "TRAKT_CLIENT_ID=$TRAKT_CLIENT_ID"
            fi

            if [[ -n "$TRAKT_CLIENT_SECRET" ]]; then
              echo "TRAKT_CLIENT_SECRET=$TRAKT_CLIENT_SECRET"
            fi
          } > local.properties

      - name: Assemble Android full debug build
        run: ./gradlew :composeApp:assembleFullDebug

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: omnio-mobile-full-debug-apk
          path: composeApp/build/outputs/apk/full/debug/*.apk
          if-no-files-found: error